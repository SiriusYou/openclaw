# ============================================================================
# Marketing Cron Jobs — Single Source of Truth
# ============================================================================
# Sourced by: cron-health-check.sh, cron-smoke.sh, acceptance-smoke.sh
# Format: JOB_NAMES array + JOB_WINDOWS array (parallel, same index)
#
# Windows = max hours since last successful run before flagging stale
#   daily(cost/brief/smoke) ≤ 48h
#   weekly(reflect) ≤ 8d (192h)
#   semimonthly(evolution) ≤ 20d (480h)
#   6h(gateway-health) ≤ 12h
# ============================================================================

MARKETING_CRON_NAMES=(
  "marketing-cost-daily"
  "marketing-brief-daily"
  "marketing-smoke-daily"
  "marketing-reflect-weekly"
  "marketing-evolution-semimonthly"
  "marketing-gateway-health"
)

MARKETING_CRON_WINDOWS=(
  48
  48
  48
  192
  480
  12
)

MARKETING_CRON_COUNT=${#MARKETING_CRON_NAMES[@]}
